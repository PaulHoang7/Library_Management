<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Danh mục sách')}"></head>
<body>
<div class="ambient-bg"></div>
<nav th:replace="~{fragments/common :: nav(${currentPath})}"></nav>

<main class="container app-shell">
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <section class="page-head">
    <div>
      <h2 class="page-title">Danh mục sách cho bạn đọc</h2>
      <p class="page-subtitle">Xem thông tin cơ bản. Muốn mượn sách thì vui lòng đăng nhập.</p>
    </div>
  </section>

  <section class="book-grid">
    <article class="book-card panel" th:each="book : ${books}">
      <img class="book-cover" th:src="${book.coverImage != null ? book.coverImage : 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=900&q=80'}" th:alt="${book.title}">
      <div class="book-info">
        <h3 th:text="${book.title}">Tên sách</h3>
        <p class="book-meta" th:text="${'Tác giả: ' + book.author}">Tác giả</p>
        <p class="book-meta" th:text="${'Thể loại: ' + (book.categoryName != null ? book.categoryName : 'Chưa phân loại')}"></p>
        <p class="book-meta" th:text="${'Số lượng còn: ' + book.quantity}"></p>
        <div class="book-actions">
          <a class="btn btn-sm btn-primary" th:if="${currentUser != null and book.quantity > 0}" th:href="@{/borrow/request(bookId=${book.id})}">Mượn sách</a>
          <button class="btn btn-sm btn-secondary" type="button" th:if="${currentUser != null and book.quantity <= 0}" disabled>Hết sách</button>
          <a class="btn btn-sm btn-outline-primary" th:if="${currentUser == null}" th:href="@{/login}">Đăng nhập để mượn</a>
        </div>
      </div>
    </article>
  </section>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
