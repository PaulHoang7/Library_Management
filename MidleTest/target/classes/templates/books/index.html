<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('QL Sách')}"></head><body>
<div class="ambient-bg"></div><nav th:replace="~{fragments/common :: nav(${currentPath})}"></nav>
<main class="container app-shell"><section class="page-head"><div><h2 class="page-title">Quản lý sách</h2></div><a class="btn btn-primary" th:href="@{/books/create}">+ Thêm sách</a></section>
<section class="panel"><form class="mb-3" method="get" th:action="@{/books}"><input class="form-control" name="q" th:value="${q}" placeholder="Tìm tên sách hoặc tác giả..."></form>
<div class="table-wrap"><table class="table table-hover align-middle"><thead><tr><th>#</th><th>Ảnh</th><th>Tiêu đề</th><th>Tác giả</th><th>Thể loại</th><th>SL</th><th></th></tr></thead><tbody>
<tr th:each="book,iter : ${books}"><td th:text="${iter.count}">1</td><td><img class="table-cover" th:src="${book.coverImage}" alt="cover"></td><td th:text="${book.title}"></td><td th:text="${book.author}"></td><td th:text="${book.categoryName}"></td><td th:text="${book.quantity}"></td><td>
<a class="btn btn-sm btn-outline-primary" th:href="@{/books/edit/{id}(id=${book.id})}">Sửa</a>
<form class="d-inline" method="post" th:action="@{/books/delete/{id}(id=${book.id})}" onsubmit="return confirm('Xóa sách này?')"><button class="btn btn-sm btn-outline-danger">Xóa</button></form>
</td></tr></tbody></table></div></section></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
