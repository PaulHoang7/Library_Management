<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Đăng nhập')}"></head>
<body>
<div class="ambient-bg"></div>
<nav th:replace="~{fragments/common :: nav(${currentPath})}"></nav>
<main class="container app-shell">
  <section class="panel form-shell mx-auto" style="max-width:520px;">
    <h2 class="mb-3">Đăng nhập</h2>
    <p class="text-muted">Đăng nhập bằng email + mật khẩu hoặc bằng Google.</p>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <form method="post" th:action="@{/login}">
      <div class="mb-3"><label class="form-label">Email (tên đăng nhập)</label><input type="email" name="email" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Mật khẩu</label><input type="password" name="password" class="form-control" required></div>
      <button class="btn btn-primary" type="submit">Đăng nhập</button>
      <a class="btn btn-outline-secondary" th:href="@{/register}">Đăng ký</a>
    </form>
    <div class="mt-4" th:if="${googleClientId != null and !#strings.isEmpty(googleClientId)}">
      <hr>
      <p class="text-muted mb-2">Hoặc đăng nhập nhanh bằng Google:</p>
      <div id="g_id_onload"
           th:attr="data-client_id=${googleClientId},data-callback='handleGoogleCredential',data-auto_prompt='false'"></div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="pill"
           data-theme="outline"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"></div>
      <form id="googleLoginForm" method="post" th:action="@{/auth/google}">
        <input type="hidden" id="googleCredential" name="credential">
      </form>
    </div>
    <div class="mt-3 alert alert-warning"
         th:if="${googleClientId == null or #strings.isEmpty(googleClientId)}">
      Chưa cấu hình Google Login. Bạn vẫn đăng nhập bằng email + mật khẩu bình thường.
    </div>
  </section>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  function handleGoogleCredential(response) {
    if (!response || !response.credential) {
      return;
    }
    document.getElementById('googleCredential').value = response.credential;
    document.getElementById('googleLoginForm').submit();
  }
</script>
</body>
</html>
